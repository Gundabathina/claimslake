# ClaimsLake - project tooling configuration.
#
# Configures pytest so that running 'pytest' from the repository root can
# import the ingestion package (via pythonpath) and discovers tests under
# tests/. This is why the ingestion CLI and the test suite both work when
# invoked from the repo root.

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-v"
import-mode = "importlib"
