# ClaimsLake local development stack
# Brings up: MinIO (S3-compatible object storage), Postgres (Airflow metadata DB
# + local analytics warehouse), and Airflow (webserver + scheduler, LocalExecutor).
#
# Usage:
#   docker compose up -d        start everything
#   docker compose down         stop everything
#   docker compose down -v      stop and wipe volumes (full reset)
#
# This is a LOCAL DEVELOPMENT substitute for the AWS production design
# (S3 -> MinIO, Redshift -> Postgres/DuckDB). See docs/architecture for the
# full comparison between this local stack and the AWS reference architecture.

version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${WAREHOUSE_USER:-claimslake_user}:${WAREHOUSE_PASSWORD:-changeme_local_only}@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW_UID: "50000"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./processing:/opt/airflow/processing
    - ./pyspark:/opt/airflow/pyspark
    - ./ingestion:/opt/airflow/ingestion
    - ./config:/opt/airflow/config
    - airflow_logs:/opt/airflow/logs
  depends_on:
    - postgres

services:
  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: claimslake-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: claimslake-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER:-claimslake_user}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD:-changeme_local_only}
      POSTGRES_DB: ${WAREHOUSE_DB:-claimslake}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_USER:-claimslake_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: claimslake-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    container_name: claimslake-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    container_name: claimslake-airflow-scheduler
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  minio_data:
  postgres_data:
  airflow_logs:
